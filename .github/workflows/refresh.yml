name: Refresh Monofloor Data

on:
  schedule:
    - cron: "*/30 * * * *"  # a cada 30 min
  workflow_dispatch:        # permite rodar manualmente

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run refresh script
        id: refresh
        continue-on-error: true
        run: |
          mkdir -p analise/dados
          {
            echo "================================================"
            echo "WORKFLOW STEP RUNNING at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "GITHUB_SHA=$GITHUB_SHA"
            echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
            echo "PWD=$(pwd)"
            echo "================================================"
          } > analise/dados/.refresh-log.txt
          bash analise/refresh.sh
          echo "REFRESH_EXIT_CODE=$?" >> analise/dados/.refresh-log.txt
          echo "WORKFLOW STEP DONE at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> analise/dados/.refresh-log.txt
        env:
          TZ: America/Sao_Paulo

      - name: Commit and push if changed
        if: always()
        run: |
          git config user.name "monofloor-bot"
          git config user.email "bot@monofloor.local"
          # git add -A pega TODOS os arquivos modificados (respeitando .gitignore).
          # Antes era lista fixa que deixava arquivos unstaged → pull --rebase quebrava.
          git add -A
          if git diff --staged --quiet; then
            echo "Sem mudanças — nada a commitar"
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "🔄 Refresh automático $STAMP"
          # Loop de push com backoff. --autostash garante que pull --rebase nunca
          # falhe por unstaged changes. exit 1 no final pra ter visibilidade real.
          for i in 1 2 3 4 5 6 7 8; do
            if git pull --rebase --autostash && git push; then
              echo "✅ Push OK na tentativa $i"
              exit 0
            fi
            echo "⚠ Tentativa $i falhou, aguardando $((i * 3))s..."
            sleep $((i * 3))
          done
          echo "::error::Push falhou após 8 tentativas"
          exit 1

      - name: Fail if refresh script failed
        if: steps.refresh.outcome == 'failure'
        run: |
          echo "::error::refresh.sh saiu com erro — veja .refresh-log.txt no repo pra detalhes"
          exit 1
