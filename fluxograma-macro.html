<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monofloor — Fluxograma Macro Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#111;--card2:#161616;--border:#1e1e1e;--accent:#c4a77d;--text:#e5e5e5;--text2:#999;--text3:#555;
--oe:#3b82f6;--oec:#ec4899;--oei:#06b6d4;--oel:#f97316;--oect:#a855f7;
--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

.header{background:linear-gradient(135deg,#0f0f0f,#1a1208);border-bottom:1px solid var(--border);padding:18px 20px 14px;position:sticky;top:0;z-index:100}
.header-row{display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#000}
.header h1{font-size:17px;font-weight:700;color:var(--accent)}
.header .sub{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--card);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:66px;z-index:99}
.tab{padding:10px 14px;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.tab:hover{background:var(--card2)}
.tab.active{border-bottom-color:var(--accent)}

.flow-view{display:none;padding:12px 16px 80px}
.flow-view.active{display:block}

.flow-intro{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);margin-bottom:14px;font-size:12px;line-height:1.6;color:var(--text2)}
.flow-intro strong{color:var(--text)}

/* ── NODES ── */
.node{position:relative;margin-bottom:2px}
.node-main{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);transition:all .15s}
.node-main:hover{border-color:#333}
.node-code{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:3px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.node-body{flex:1;min-width:0}
.node-text{font-size:12.5px;line-height:1.5;color:var(--text)}
.node-sub{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4}
.node-sys{font-size:9px;padding:2px 6px;border-radius:5px;background:#1a1a1a;color:var(--text3);margin-top:4px;display:inline-block}

/* connector */
.pipe{height:18px;display:flex;align-items:center;padding-left:26px}
.pipe::before{content:'';width:1.5px;height:100%;background:var(--border)}

/* decision */
.decision{margin-bottom:2px}
.decision .node-main{border-left:3px solid var(--amber);background:#111100}
.decision .node-text{color:var(--amber)}

/* branches */
.branches{display:flex;gap:6px;margin-bottom:2px;padding-left:16px}
.branch{flex:1;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.branch-label{font-size:10px;font-weight:600;padding:5px 10px;text-align:center;text-transform:uppercase;letter-spacing:.5px}
.branch-yes .branch-label{background:#22c55e15;color:var(--green)}
.branch-no .branch-label{background:#ef444415;color:var(--red)}
.branch-content{padding:6px 8px}
.branch-content .node-main{border:none;padding:6px 8px;background:transparent}
.branch-content .node-main:hover{background:var(--card2)}
.branch-content .node-code{font-size:9px;padding:2px 5px}
.branch-content .node-text{font-size:11px}

/* investigation */
.investigation{margin-bottom:2px}
.investigation .node-main{border-left:3px solid var(--red);background:#1a0505}
.invest-badge{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600;display:inline-block;margin-top:3px}
.invest-admin{background:#f59e0b22;color:var(--amber)}
.invest-tech{background:#ef444422;color:var(--red)}
.invest-log{background:#f9731622;color:var(--oel)}

/* sync point */
.sync{margin-bottom:2px}
.sync .node-main{border-left:3px solid var(--oe);background:#0a1020}
.sync-tag{font-size:9px;padding:2px 7px;border-radius:5px;background:#3b82f622;color:var(--oe);font-weight:600;display:inline-block;margin-top:3px}

/* phase separator */
.phase{margin:16px 0 8px;padding:8px 12px;border-radius:8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border:1px dashed}

/* sla box */
.sla-box{display:inline-block;font-size:9px;padding:2px 7px;border-radius:5px;background:#f59e0b15;color:var(--amber);font-weight:500;margin-left:4px}

/* legend */
.legend-bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);background:var(--card)}
.legend-bar span{display:flex;align-items:center;gap:4px}
.legend-bar .ld{width:10px;height:3px;border-radius:2px}

/* PP:001 */
.pp-box{background:var(--card);border:1px solid var(--accent);border-radius:10px;padding:14px;margin:12px 0;font-size:12px;line-height:1.7;color:var(--text2)}
.pp-box strong{color:var(--accent)}
.pp-box .pp-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px}
</style>
</head>

// ═══ RENDER ═══
function renderTabs(){
  document.getElementById('tabs').innerHTML = FLOWS.map((f,i) =>
    `<div class="tab${i===0?' active':''}" style="color:${f.color};${i===0?'border-bottom-color:'+f.color:''}" onclick="showFlow('${f.id}',this)">${f.name.split('—')[0].trim()}</div>`
  ).join('');
}

function renderNode(s, flow){
  const codeColor = flow.color;
  const codeHtml = s.code ? `<span class="node-code" style="background:${codeColor}15;color:${codeColor}">${s.code}</span>` : '';
  const sysHtml = s.sys ? `<span class="node-sys">${s.sys}</span>` : '';
  const slaHtml = s.sla ? `<span class="sla-box">${s.sla}</span>` : '';
  const subHtml = s.sub ? `<div class="node-sub">${s.sub}</div>` : '';

  if(s.t === 'decision'){
    let branches = '';
    if(s.yes || s.no){
      branches = `<div class="branches">
        <div class="branch branch-yes"><div class="branch-label">Sim</div><div class="branch-content"><div class="node-main"><div class="node-text" style="font-size:11px;color:var(--text2)">${s.yes||''}</div></div></div></div>
        <div class="branch branch-no"><div class="branch-label">Não</div><div class="branch-content"><div class="node-main"><div class="node-text" style="font-size:11px;color:var(--text2)">${s.no||''}</div></div></div></div>
      </div>`;
    }
    return `<div class="decision"><div class="node-main">${codeHtml}<div class="node-body"><div class="node-text">${s.text}${slaHtml}</div>${subHtml}</div></div></div>${branches}<div class="pipe"></div>`;
  }

  if(s.t === 'sync'){
    return `<div class="sync"><div class="node-main">${codeHtml}<div class="node-body"><div class="node-text">${s.text}</div><span class="sync-tag">⚡ ${s.sync}</span>${subHtml}</div></div></div><div class="pipe"></div>`;
  }

  if(s.t === 'investigation'){
    const lvl = s.level === 'admin' ? 'invest-admin' : s.level === 'tech' ? 'invest-tech' : 'invest-log';
    const lvlName = s.level === 'admin' ? 'ADMINISTRATIVA' : s.level === 'tech' ? 'TÉCNICA' : 'LOGÍSTICA';
    return `<div class="investigation"><div class="node-main">${codeHtml}<div class="node-body"><div class="node-text">${s.text}</div><span class="invest-badge ${lvl}">INVESTIGAÇÃO ${lvlName}</span>${subHtml}</div></div></div><div class="pipe"></div>`;
  }

  if(s.t === 'pp'){
    return `<div class="pp-box"><div class="pp-title">PP:001 — Processo Padrão</div>${s.text.split('\n').map(l=>`<div>${l}</div>`).join('')}</div>`;
  }

  return `<div class="node"><div class="node-main">${codeHtml}<div class="node-body"><div class="node-text">${s.text}${slaHtml}</div>${subHtml}${sysHtml}</div></div></div><div class="pipe"></div>`;
}

function renderFlows(){
  document.getElementById('content').innerHTML = FLOWS.map((f,i) =>
    `<div class="flow-view${i===0?' active':''}" id="flow-${f.id}">
      <div class="flow-intro">${f.intro}</div>
      ${f.steps.map(s => renderNode(s, f)).join('')}
    </div>`
  ).join('');
}

function showFlow(id, tabEl){
  document.querySelectorAll('.flow-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {t.classList.remove('active');t.style.borderBottomColor='transparent'});
  document.getElementById('flow-'+id).classList.add('active');
  tabEl.classList.add('active');
  const flow = FLOWS.find(f=>f.id===id);
  if(flow) tabEl.style.borderBottomColor = flow.color;
  window.scrollTo({top:0,behavior:'smooth'});
}

renderTabs();
renderFlows();
</script>
